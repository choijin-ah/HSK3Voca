<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>어휘 학습</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="wrap">
    <div class="header-row">
      <h1 id="pageTitle">어휘 학습</h1>
      <p class="subtitle" id="pageSubtitle"></p>
      <button id="menuToggle" type="button" class="menu-toggle" aria-label="메뉴" aria-expanded="false" aria-controls="appMenu">
        <i class="fa-solid fa-bars menu-icon menu-icon-open" aria-hidden="true"></i>
        <i class="fa-solid fa-xmark menu-icon menu-icon-close" aria-hidden="true"></i>
      </button>
    </div>
    <nav id="appMenu" class="app-menu" aria-label="메뉴" hidden>
      <div class="menu-group">
        <p class="menu-heading">학습 과목</p>
        <div id="menuSubjectList" class="menu-sub" role="group"></div>
        <button id="createSetMenu" type="button" class="menu-item menu-subitem menu-add">＋ 새 단어장 만들기</button>
      </div>
      <button id="restoreRemoved" type="button" class="menu-item">지운 단어 복구</button>
      <div class="menu-account">
        <button id="signInGoogle" type="button" class="menu-item">Google 로그인</button>
        <button id="signOutGoogle" type="button" class="menu-item" hidden>로그아웃</button>
        <span class="account" id="accountText" hidden></span>
        <span class="sync-status" id="syncStatus" hidden></span>
      </div>
    </nav>
  </div>
</header>

<div class="toolbar">
  <div class="tool-inner">
    <button id="reviewButton" type="button">복습</button>
    <button id="pinyinPracticeButton" type="button" aria-pressed="false">쓰기 연습 모드</button>
    <button id="quizModeButton" type="button">퀴즈 모드</button>
    <button id="addWordButton" type="button" hidden>단어 추가</button>
    <button id="addCategoryButton" type="button" hidden>목차 추가</button>
    <button id="clearChecks" type="button">체크 초기화</button>
    <span class="progress" id="progressText"></span>
  </div>
</div>

<div class="sticky-controls">
  <div class="tool-inner">
    <button id="hideMeaning" type="button">뜻</button>
    <button id="hidePinyin" type="button">읽기</button>
    <button id="toggleChecked" type="button" aria-pressed="false">체크 숨김</button>
    <button id="removeChecked" type="button">체크 지움</button>
  </div>
</div>

<main>
  <div id="navBar" hidden>
    <button id="backToToc" type="button">← 목차로</button>
    <span id="navTitle" class="nav-title"></span>
  </div>

  <section class="landing-panel" id="landingPanel">
    <div class="landing-copy">
      <h2>무엇을 공부할까요?</h2>
      <p>학습할 단어장을 선택하세요.</p>
    </div>
    <div class="landing-grid" id="landingGrid"></div>
  </section>

  <section class="panel quiz-panel" id="quizPanel" hidden>
    <div class="quiz-top">
      <h2>퀴즈</h2>
      <div class="quiz-options">
        <select id="quizMode" aria-label="퀴즈 방식">
          <option value="front-meaning">단어 → 뜻</option>
          <option value="front-pinyin-input">단어 → 병음 입력</option>
          <option value="meaning-front">뜻 → 단어</option>
          <option value="reading-front">읽기 → 단어</option>
        </select>
        <select id="quizScope" aria-label="퀴즈 범위">
          <option value="active">지운 단어 제외</option>
          <option value="unchecked">미체크 단어</option>
          <option value="checked">체크 단어</option>
          <option value="all">전체 단어</option>
        </select>
      </div>
    </div>
    <p class="note" id="quizEmpty" hidden></p>
    <div class="quiz-card" id="quizCard">
      <div class="quiz-meta" id="quizMeta"></div>
      <div class="quiz-prompt" id="quizPrompt"></div>
      <div class="quiz-reading" id="quizReading"></div>
      <div class="quiz-choices" id="quizChoices" hidden></div>
      <form class="quiz-input" id="quizInputForm" hidden>
        <label class="sr-only" for="quizPinyinInput">병음 입력</label>
        <input id="quizPinyinInput" type="text" inputmode="latin" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="pinyin">
        <button id="submitQuizPinyin" type="submit">확인</button>
      </form>
      <div class="quiz-feedback" id="quizFeedback" aria-live="polite" hidden></div>
      <div class="quiz-answer" id="quizAnswer" hidden></div>
    </div>
    <div class="quiz-actions">
      <button id="showQuizAnswer" type="button">정답 보기</button>
      <button id="nextQuiz" type="button">다음 문제</button>
      <button id="checkQuizWord" type="button">체크하기</button>
    </div>
  </section>

  <section class="panel review-panel" id="reviewPanel" hidden>
    <div class="review-top">
      <h2>복습</h2>
      <span class="review-progress" id="reviewProgress"></span>
    </div>
    <div class="review-card" id="reviewCard">
      <div class="review-meta" id="reviewMeta"></div>
      <div class="review-front" id="reviewFront"></div>
      <button id="reviewSpeak" type="button" class="review-speak" aria-label="발음 듣기">🔊 발음</button>
      <div class="review-back" id="reviewBack" hidden>
        <div class="review-reading" id="reviewReading"></div>
        <div class="review-meaning" id="reviewMeaning"></div>
      </div>
    </div>
    <div class="review-done" id="reviewDone" hidden></div>
    <div class="review-actions">
      <button id="reviewShow" type="button">정답 보기</button>
      <div class="review-grades" id="reviewGrades" hidden>
        <button type="button" data-grade="again" class="grade-again">모름 <span class="grade-hint"></span></button>
        <button type="button" data-grade="hard" class="grade-hard">애매 <span class="grade-hint"></span></button>
        <button type="button" data-grade="good" class="grade-good">알아요 <span class="grade-hint"></span></button>
      </div>
    </div>
  </section>

  <section class="panel" id="tocPanel">
    <div class="toc-tools">
      <label class="sr-only" for="setSelector">과목 선택</label>
      <select id="setSelector" class="set-selector" aria-label="과목 선택" hidden></select>
      <div class="toc-actions">
        <button id="addCategoryTocButton" type="button" hidden>목차 추가</button>
        <button id="addWordTocButton" type="button" hidden>단어 추가</button>
      </div>
    </div>
    <h2>목차</h2>
    <div class="grid" id="tocGrid"></div>
  </section>

  <div id="categoryRoot"></div>
</main>

<div class="modal" id="wordFormModal" hidden>
  <div class="modal-backdrop" data-close="word"></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="wordFormTitle">
    <h3 id="wordFormTitle">단어 추가</h3>
    <form id="wordForm">
      <label class="modal-field">
        <span>목차</span>
        <select id="wordCategory"></select>
      </label>
      <label class="modal-field" id="wordNewCategoryWrap" hidden>
        <span>새 목차 이름</span>
        <input id="wordNewCategory" type="text" autocomplete="off">
      </label>
      <div class="mode-toggle word-mode-toggle" role="group" aria-label="단어 추가 방식">
        <button type="button" id="wordSingleMode" class="mode-option is-active" aria-pressed="true">개별로 올리기</button>
        <button type="button" id="wordImportMode" class="mode-option" aria-pressed="false">엑셀로 옮기기</button>
      </div>
      <div id="wordSingleFields">
        <label class="modal-field">
          <span id="wordFrontLabel">단어</span>
          <input id="wordFront" type="text" autocomplete="off">
        </label>
        <label class="modal-field">
          <span id="wordMeaningLabel">뜻</span>
          <input id="wordMeaning" type="text" autocomplete="off">
        </label>
        <label class="modal-field">
          <span>품사 (선택)</span>
          <input id="wordPos" type="text" autocomplete="off">
        </label>
        <label class="modal-field">
          <span id="wordReadingLabel">읽기</span>
          <div class="field-row">
            <input id="wordReading" type="text" autocomplete="off">
            <button type="button" id="wordReadingAuto" class="field-action" hidden>자동</button>
          </div>
        </label>
      </div>
      <div class="import-box" id="wordImportBox" hidden>
        <div class="import-head">
          <span>엑셀 자동 입력</span>
          <button type="button" id="wordTemplateDownload" class="field-action">양식 다운로드</button>
        </div>
        <label class="modal-field">
          <span>채운 파일 업로드</span>
          <input id="wordImportFile" type="file" accept=".xlsx,.xls,.csv,.tsv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">
        </label>
        <p class="modal-hint" id="wordImportHint" aria-live="polite"></p>
      </div>
      <div class="modal-actions">
        <button type="submit" id="wordSubmitButton">추가</button>
        <button type="button" id="wordFormClose" class="ghost">닫기</button>
      </div>
      <p class="modal-hint" id="wordFormHint" aria-live="polite"></p>
    </form>
  </div>
</div>

<div class="modal" id="categoryFormModal" hidden>
  <div class="modal-backdrop" data-close="category"></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="categoryFormTitle">
    <h3 id="categoryFormTitle">목차 추가</h3>
    <form id="categoryForm">
      <label class="modal-field">
        <span>목차 이름</span>
        <input id="categoryTitle" type="text" autocomplete="off" required>
      </label>
      <label class="modal-field">
        <span>설명 (선택)</span>
        <input id="categoryDescription" type="text" autocomplete="off">
      </label>
      <label class="modal-field">
        <span>표시 라벨 (선택)</span>
        <input id="categoryPriority" type="text" autocomplete="off" value="추가">
      </label>
      <div class="modal-actions">
        <button type="submit">추가</button>
        <button type="button" id="categoryFormClose" class="ghost">취소</button>
      </div>
      <p class="modal-hint" id="categoryFormHint" aria-live="polite"></p>
    </form>
  </div>
</div>

<div class="modal" id="setFormModal" hidden>
  <div class="modal-backdrop" data-close="set"></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="setFormTitle">
    <h3 id="setFormTitle">새 단어장 만들기</h3>
    <form id="setForm">
      <label class="modal-field">
        <span>단어장 이름</span>
        <input id="setTitle" type="text" autocomplete="off" required>
      </label>
      <label class="modal-field">
        <span>언어</span>
        <select id="setLanguage">
          <option value="zh-CN">중국어</option>
          <option value="ja">일본어</option>
          <option value="en">영어</option>
          <option value="other">기타</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="submit">만들기</button>
        <button type="button" id="setFormClose" class="ghost">취소</button>
      </div>
      <p class="modal-hint" id="setFormHint" aria-live="polite"></p>
    </form>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="data/sets.js"></script>
<script src="quiz.js"></script>
<script src="srs.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
